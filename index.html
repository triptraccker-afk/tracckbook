<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=5" />
    <link rel="apple-touch-icon" href="/icon.svg?v=5" />
    <title>TrackBook</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fail-safe: If the app doesn't load within 12 seconds, show a recovery button
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = `
            <div style="min-h-screen; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; font-family: sans-serif; text-align: center; background: #f8fafc;">
              <div style="background: white; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 320px;">
                <h2 style="margin: 0 0 10px 0; color: #1e293b; font-size: 18px;">Loading taking too long?</h2>
                <p style="margin: 0 0 20px 0; color: #64748b; font-size: 14px;">If you see a blank screen, there might be a connection issue or old data stuck in your browser.</p>
                <button onclick="window.location.reload()" style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px;">Try Refreshing</button>
                <button onclick="clearAppCache()" style="width: 100%; padding: 12px; background: white; color: #ef4444; border: 1px solid #fecaca; border-radius: 12px; font-weight: bold; cursor: pointer;">Clear Local Data</button>
              </div>
            </div>
          `;
        }
      }, 12000);

      function clearAppCache() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for(let registration of registrations) registration.unregister();
          });
        }
        localStorage.clear();
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        window.location.reload();
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
